<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="content">
    <div class="left_side">
        <div class="foreground">
            <img src="logo.png" alt="">
            <div id="logo">ODIN</div>
        </div>
        <div id="copyright">
            Photo by <a href="https://unsplash.com/@haliewestphoto">Halie West</a> on <a href="https://unsplash.com">Unsplash</a>
        </div>
    </div>

    <div class="right_side">
        <div class="header">This is not a real online serive! You know you need something like this in your life to help you realize your deepest dreams. Sign up now to get started.
            <br><br>
        You <em>know</em> you want to.
        </div>
        <div class="form-outline">
            <legend>Let's do this!</legend>

            <div class="form">  
                <div>
                    <label for="first_name">FIRST NAME</label>
                    <input type="text" name="firstName" id="first_name" placeholder="Thor">
                </div>

                <div>
                    <label for="last_name">LAST NAME</label>
                    <input type="text" name="lastName" id="last_name">
                </div>

                <div>
                    <label for="email">EMAIL</label>
                    <input type="email" name="Email" id="email">
                </div>

                <div>
                    <label for="phone-number">PHONE NUMBER</label>
                    <input type="number" name="PhoneNumber" id="phone-number">
                </div>

                <div>
                    <label for="password">PASSWORD</label>
                    <input type="password" name="Password" id="password">
                </div>

                <div>
                    <label for="confirm_password">CONFIRM PASSWORD</label>
                    <input type="password" name="Password" id="confirm_password">
                </div>
            </div>
        </div>
            
        <div class="footer">
            <button>Create Account</button>
            <p>Already have an Account? <a href="#">Log in</a></p>
        </div>
    </div>
    </div>
</body>
</html>
